<script>
  (function() {
    const minScale = 0.3;
    const fitPadding = 2;
    let fitScheduled = false;

    function visibleSlides() {
      return Array.from(document.querySelectorAll(".reveal .slides > section"))
        .filter((section) => {
          const rect = section.getBoundingClientRect();
          const style = window.getComputedStyle(section);
          return rect.width > 0 && rect.height > 0 && style.display !== "none";
        });
    }

    function measuredChildren(section) {
      return Array.from(section.children).filter((child) => {
        if (child.matches("aside.notes, aside:not(.notes), .speaker-notes")) {
          return false;
        }

        const style = window.getComputedStyle(child);
        return style.display !== "none" && style.visibility !== "hidden";
      });
    }

    function contentOverflow(section) {
      const sectionRect = section.getBoundingClientRect();
      const sectionStyle = window.getComputedStyle(section);
      const allowedBottom = sectionRect.bottom - parseFloat(sectionStyle.paddingBottom || 0);
      let maxBottom = sectionRect.top;

      measuredChildren(section).forEach((child) => {
        const rect = child.getBoundingClientRect();
        if (rect.width === 0 && rect.height === 0) {
          return;
        }
        maxBottom = Math.max(maxBottom, rect.bottom);
      });

      return Math.max(0, maxBottom - allowedBottom + fitPadding);
    }

    function fitSlide(section) {
      section.style.removeProperty("font-size");
      const maxFontSize = parseFloat(window.getComputedStyle(section).fontSize);

      if (!maxFontSize || contentOverflow(section) <= 0) {
        return;
      }

      let low = minScale;
      let high = 1;
      let best = minScale;

      for (let i = 0; i < 12; i += 1) {
        const scale = (low + high) / 2;
        section.style.fontSize = `${maxFontSize * scale}px`;

        if (contentOverflow(section) <= 0) {
          best = scale;
          low = scale;
        } else {
          high = scale;
        }
      }

      section.style.fontSize = `${maxFontSize * best}px`;
    }

    function fitVisibleSlides() {
      visibleSlides().forEach(fitSlide);
    }

    function scheduleFit() {
      if (fitScheduled) {
        return;
      }

      fitScheduled = true;
      window.requestAnimationFrame(() => {
        window.requestAnimationFrame(() => {
          fitScheduled = false;
          fitVisibleSlides();
        });
      });
    }

    window.addEventListener("load", scheduleFit);
    window.addEventListener("resize", scheduleFit);

    document.addEventListener("DOMContentLoaded", function() {
      scheduleFit();

      if (window.Reveal && typeof window.Reveal.on === "function") {
        window.Reveal.on("ready", scheduleFit);
        window.Reveal.on("slidechanged", scheduleFit);
        window.Reveal.on("resize", scheduleFit);
        window.Reveal.on("overviewhidden", scheduleFit);
      }
    });
  })();
</script>
<script>
  (function() {
    let sourceFooterScheduled = false;

    function currentSlide() {
      if (!window.Reveal || typeof window.Reveal.getCurrentSlide !== "function") {
        return null;
      }

      return window.Reveal.getCurrentSlide();
    }

    function syncSourceFooter() {
      const reveal = document.querySelector(".reveal");

      if (!reveal) {
        return;
      }

      reveal.querySelectorAll(":scope > .footer.source-citation-footer").forEach((footer) => {
        footer.remove();
      });

      const slide = currentSlide();

      if (!slide) {
        return;
      }

      const slideFooter = slide.querySelector(":scope > .footer.source-citation-footer");

      if (!slideFooter) {
        return;
      }

      const clonedFooter = slideFooter.cloneNode(true);
      clonedFooter.dataset.sourceFooterClone = "true";
      reveal.appendChild(clonedFooter);
    }

    function scheduleSourceFooterSync() {
      if (sourceFooterScheduled) {
        return;
      }

      sourceFooterScheduled = true;
      window.requestAnimationFrame(() => {
        window.requestAnimationFrame(() => {
          sourceFooterScheduled = false;
          syncSourceFooter();
        });
      });
    }

    window.addEventListener("load", scheduleSourceFooterSync);
    window.addEventListener("hashchange", scheduleSourceFooterSync);

    document.addEventListener("DOMContentLoaded", function() {
      scheduleSourceFooterSync();

      if (window.Reveal && typeof window.Reveal.on === "function") {
        window.Reveal.on("ready", scheduleSourceFooterSync);
        window.Reveal.on("slidechanged", scheduleSourceFooterSync);
        window.Reveal.on("overviewhidden", scheduleSourceFooterSync);
      }
    });
  })();
</script>
