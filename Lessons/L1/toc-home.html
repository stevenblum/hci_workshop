<script>
  (function() {
    const home = document.querySelector(".toc-home");
    const overview = document.querySelector(".toc-overview");
    const deck = document.querySelector(".reveal");

    if (home && deck && home.parentElement !== deck) {
      deck.appendChild(home);
    }

    if (overview && deck && overview.parentElement !== deck) {
      deck.appendChild(overview);
    }

    if (overview) {
      overview.addEventListener("click", function(event) {
        event.preventDefault();

        if (window.Reveal && typeof window.Reveal.toggleOverview === "function") {
          window.Reveal.toggleOverview();
        }
      });
    }
  })();
</script>
